worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;

    server {
        listen 80;
        server_name _;

        # Game frontend (Vite build output)
        root /app/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Public assets (maps, music, textures, etc.)
        location /maps/    { alias /app/public/maps/; }
        location /music/   { alias /app/public/music/; }
        location /textures/ { alias /app/public/textures/; }
        location /maptex/  { alias /app/public/maptex/; }
        location /sfx/     { alias /app/public/sfx/; }
        location /water/   { alias /app/public/water/; }
        location = /manifest.json { alias /app/public/manifest.json; }

        # Docs site (Leptos SSR proxy)
        location /docs {
            proxy_pass http://127.0.0.1:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /pkg {
            proxy_pass http://127.0.0.1:3002;
        }

        # WebSocket (game server)
        location /ws {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}
