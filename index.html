<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid War</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        overflow: hidden;
        background: #0a0a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      canvas {
        display: block;
        cursor: none;
      }
      #scoreboard {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-family: monospace;
        font-size: 14px;
        background: rgba(0, 0, 0, 0.7);
        padding: 6px 16px;
        border-radius: 4px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="scoreboard"></div>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
